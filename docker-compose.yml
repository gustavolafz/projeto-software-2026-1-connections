version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: postgres-users-compose
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: users
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    container_name: mongo-connections-compose
    ports:
      - "27017:27017"

  connection-service:
    image: conexoes
    depends_on:
      - mongo
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/connections
    ports:
      - "8080:8080"